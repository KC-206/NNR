<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huntress Harmonies</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0e1214;
      font-family: 'JetBrains Mono', monospace;
    }

    #card {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #151b1f 0%, #0e1214 100%);
      border: 1px solid #232e33;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      text-decoration: none;
    }
    #card:hover { border-color: #6e9e84; }
    #card:hover #listen-btn { background: #92c0a6; }

    /* Blurred background art */
    #bg-art {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      filter: blur(20px);
      transform: scale(1.1);
    }

    /* Album art */
    #art {
      width: 120px;
      height: 120px;
      object-fit: cover;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    /* Info */
    #info {
      flex: 1;
      min-width: 0;
      padding: 0 14px;
      position: relative;
      z-index: 1;
    }
    #eyebrow {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6e9e84;
      margin-bottom: 5px;
    }
    #title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 700;
      color: #cdc4ad;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.15;
      margin-bottom: 4px;
    }
    #artist {
      font-size: 10px;
      color: #7a7568;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #branding {
      font-size: 9px;
      color: #4c5a60;
      margin-top: 8px;
      letter-spacing: 0.06em;
    }

    /* Listen button */
    #listen-btn {
      flex-shrink: 0;
      margin-right: 16px;
      position: relative;
      z-index: 1;
      background: #6e9e84;
      color: #07090a;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      transition: background 0.15s;
      text-decoration: none;
    }

    #error {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #4c5a60;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>

<div id="error" style="display:none">Song not found</div>

<a id="card" href="#" target="_blank" rel="noopener">
  <div id="bg-art"></div>
  <img id="art" src="" alt="">
  <div id="info">
    <div id="eyebrow">Huntress Harmonies</div>
    <div id="title">Loading…</div>
    <div id="artist"></div>
    <div id="branding">huntress-harmonies.github.io</div>
  </div>
  <a id="listen-btn" href="#" target="_blank" rel="noopener">
    <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    Listen
  </a>
</a>

<script>
// ── Config — update this to your GitHub Pages base URL ──────
var BASE_URL = 'https://kc-206.github.io/NNR/Songplayer/';
// ────────────────────────────────────────────────────────────

var BLANK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'%3E%3Crect fill='%231c2529' width='400' height='400'/%3E%3Ccircle cx='200' cy='200' r='55' fill='none' stroke='%23232e33' stroke-width='2'/%3E%3Ccircle cx='200' cy='200' r='12' fill='%23232e33'/%3E%3C/svg%3E";

function slugify(title) {
  return title.toLowerCase()
    .replace(/[''`]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function loadCard() {
  var songParam = getParam('song'); // slug or song id
  if (!songParam) { showError('No song specified'); return; }

  // Fetch songs.js from the main site
  fetch(BASE_URL + 'js/songs.js')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var fn = new Function(text + '\nreturn SONGS;');
      var songs = fn();

      // Find by slug or by ID
      var song = songs.find(function(s) { return s.id === songParam; })
               || songs.find(function(s) { return slugify(s.title) === songParam; });

      if (!song) { showError('Song not found'); return; }

      var art = song.artwork
        ? (song.artwork.startsWith('http') ? song.artwork : BASE_URL + song.artwork)
        : BLANK;

      var deepLink = BASE_URL + '#' + slugify(song.title);

      document.getElementById('title').textContent  = song.title;
      document.getElementById('artist').textContent = song.artist || 'Huntress';
      document.getElementById('branding').textContent = 'huntress-harmonies · click to listen';

      var artEl = document.getElementById('art');
      artEl.src = art;
      artEl.onerror = function() { this.src = BLANK; };

      document.getElementById('bg-art').style.backgroundImage = 'url(' + art + ')';

      document.getElementById('card').href       = deepLink;
      document.getElementById('listen-btn').href = deepLink;
    })
    .catch(function(e) {
      showError('Could not load songs');
      console.error(e);
    });
}

function showError(msg) {
  document.getElementById('card').style.display  = 'none';
  document.getElementById('error').style.display = 'flex';
  document.getElementById('error').textContent   = msg;
}

loadCard();
</script>
</body>
</html>
